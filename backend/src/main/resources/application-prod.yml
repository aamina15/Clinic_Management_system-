spring:
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    show-sql: false
  flyway:
    clean-disabled: true

logging:
  level:
    root: WARN
    com.clinic.management: INFO

management:
  endpoint:
    health:
      show-details: never

server:
  error:
    include-message: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://app.example.com}
